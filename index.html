        body {

        .course-card {

            padding: 0.6rem;
            margin-bottom: 0.5rem;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);

            cursor: pointer;
        }
        .course-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .course-required {
            background-color: #fee2e2; /* red-100 */
            border-left: 4px solid #ef4444; /* red-500 */
        }
        .course-elective {
            background-color: #dbeafe; /* blue-100 */
            border-left: 4px solid #3b82f6; /* blue-500 */
        }
        .course-graduate {
            background-color: #f3e8ff; /* purple-100 */
            border-left: 4px solid #9333ea; /* purple-600 */
        }
        th, td {
            vertical-align: top;
            padding: 8px;
        }
        th {
            position: sticky;
            top: 0;
            background-color: #f1f5f9;
            z-index: 10;
        }
        /* Print Styles */
        @media print {
            body {
                background-color: #ffffff;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .print-full {
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                box-shadow: none !important;
            }
            table {

            }
            .course-card {

                border: 1px solid #ddd !important;

            }

            { name: "資訊服務機構管理", grade: "四", type: "必", credits: 2, teacher: "黃元鶴", day: "星期四", slots: ["D7", "D8"], classroom: "LE205" },

            // 碩士班 (115-2)
            { name: "資訊安全", grade: "三~碩", type: "選", credits: 3, teacher: "李正吉", day: "星期一", slots: ["D2", "D3", "D4"], classroom: "LE305" },
            { name: "人工智慧", grade: "碩", type: "選", credits: 3, teacher: "杜海倫", day: "星期一", slots: ["DN", "D5", "D6"], classroom: "LE106" },
            { name: "資訊服務機構人力資源管理", grade: "三~碩", type: "選", credits: 2, teacher: "彭于萍", day: "星期二", slots: ["D7", "D8"], classroom: "LE106" },
            { name: "量化研究與統計分析", grade: "碩", type: "選", credits: 2, teacher: "黃元鶴", day: "星期三", slots: ["D7", "D8"], classroom: "LE106" },
            { name: "元資料概論", grade: "碩", type: "選", credits: 2, teacher: "吳政叡", day: "星期四", slots: ["D3", "D4"], classroom: "LE503" },
            { name: "古籍整理與利用", grade: "碩", type: "選", credits: 2, teacher: "陳冠至", day: "星期四", slots: ["D7", "D8"], classroom: "LE503" },
            { name: "資訊檢索", grade: "三~碩", type: "選", credits: 3, teacher: "陳舜德", day: "星期五", slots: ["D2", "D3", "D4"], classroom: "LE305" },
            { name: "圖書資訊議題研討", grade: "碩", type: "必", credits: 2, teacher: "董蕙茹", day: "星期五", slots: ["D5", "D6"], classroom: "LE503" }
        ];

        const timeSlots = [
            { id: "D1-D2", label: "D1-D2", time: "08:10-10:00" },
            { id: "D3-D4", label: "D3-D4", time: "10:10-12:00" },
            { id: "D5-D6", label: "D5-D6", time: "13:40-15:30" },
            { id: "D7-D8", label: "D7-D8", time: "15:40-17:30" },
            { id: "D8-E0", label: "D8-E0", time: "16:40-18:30" },
        ];
        const days = ["星期一", "星期二", "星期三", "星期四", "星期五"];
        const gradeOrder = { "一": 1, "二": 2, "三": 3, "四": 4, "碩": 5 };

        // Current Active Semester (defaults to 115-1)
        let currentSemester = '1151';

        function getActiveDataset() {
            return currentSemester === '1151' ? courseData1151 : courseData1152;
        }

        function getCourseClass(course) {
            if (course.grade === '碩') return 'course-graduate';
            return (course.type === '必' || course.type === '必修') ? 'course-required' : 'course-elective';
        }

        // Switch semester view
        function switchSemester(sem) {
            currentSemester = sem;
            const btn1151 = document.getElementById('btn-1151');
            const btn1152 = document.getElementById('btn-1152');
            const mainTitle = document.getElementById('main-title');

            if (sem === '1151') {
                btn1151.className = "px-5 py-2.5 rounded-md font-medium text-sm transition-all duration-150 bg-white text-slate-800 shadow";
                btn1152.className = "px-5 py-2.5 rounded-md font-medium text-sm transition-all duration-150 text-slate-600 hover:text-slate-800";
                mainTitle.innerText = "圖書資訊學系 115學年度 第一學期課表 (115-1)";
            } else {
                btn1152.className = "px-5 py-2.5 rounded-md font-medium text-sm transition-all duration-150 bg-white text-slate-800 shadow";
                btn1151.className = "px-5 py-2.5 rounded-md font-medium text-sm transition-all duration-150 text-slate-600 hover:text-slate-800";
                mainTitle.innerText = "圖書資訊學系 115學年度 第二學期課表 (115-2)";
            }

            applyFilters();
        }

        function renderTimetable(courses) {
            const timetableBody = document.getElementById('timetable-body');
            if (!timetableBody) return;
            timetableBody.innerHTML = '';

            const schedule = {};
            timeSlots.forEach(slot => {
                schedule[slot.id] = {};
                days.forEach(day => {
                    schedule[slot.id][day] = [];
                });
            });

            // Map and classify into time slots
            courses.forEach(course => {
                let targetSlotId = '';

                if (course.slots.includes("E0") || (course.slots.includes("D8") && !course.slots.includes("D7"))) {
                    targetSlotId = "D8-E0";
                } else if (course.slots.includes("D7") && course.slots.includes("D8")) {
                    targetSlotId = "D7-D8";
                } else if (course.slots.includes("D5") && course.slots.includes("D6")) {
                    targetSlotId = "D5-D6";
                } else if (course.slots.includes("D3") && course.slots.includes("D4")) {
                    targetSlotId = "D3-D4";
                } else if (course.slots.includes("D1") && course.slots.includes("D2")) {
                    targetSlotId = "D1-D2";
                } else if (course.slots.includes("DN")) {
                    // Decide where DN courses go based on their adjacent slots
                    if (course.slots.includes("D4")) targetSlotId = "D3-D4";
                    else if (course.slots.includes("D5")) targetSlotId = "D5-D6";
                }

                if (targetSlotId && schedule[targetSlotId] && schedule[targetSlotId][course.day]) {
                    schedule[targetSlotId][course.day].push(course);
                }
            });

            // Sort logic inside each cells according to requirements
            Object.keys(schedule).forEach(slotId => {
                days.forEach(day => {
                    schedule[slotId][day].sort((a, b) => {
                        let aSort = 0;
                        let bSort = 0;

                        // Case: D2-D4 courses (3 slots starting early) go to the top
                        const aSpansD2D4 = a.slots.includes('D2') && a.slots.includes('D4');
                        const bSpansD2D4 = b.slots.includes('D2') && b.slots.includes('D4');
                        if (aSpansD2D4) aSort = -1;
                        if (bSpansD2D4) bSort = -1;

                        // Case: DN or D7 overlapping classes go to the bottom
                        if (slotId === 'D3-D4') {
                            if (a.slots.includes('DN')) aSort = 1;
                            if (b.slots.includes('DN')) bSort = 1;
                        } else if (slotId === 'D5-D6') {
                            if (a.slots.includes('D7')) aSort = 1;
                            if (b.slots.includes('D7')) bSort = 1;
                        }

                        if (aSort !== bSort) return aSort - bSort;

                        // Default sorting: Grade (一 -> 二 -> 三 -> 四 -> 碩)
                        return (gradeOrder[a.grade] || 99) - (gradeOrder[b.grade] || 99);
                    });
                });
            });

            // Generate HTML table structure
            timeSlots.forEach(slot => {
                const row = document.createElement('tr');
                row.className = 'border-b border-slate-100 hover:bg-slate-50/50 transition-colors';
                
                // Time Slot Header Column
                row.innerHTML = `
                    <th scope="row" class="px-6 py-4 font-semibold text-slate-700 bg-slate-50 align-middle text-center border-r border-slate-200">
                        <div class="text-base font-bold tracking-tight">${slot.label}</div>
                        <div class="text-xs text-slate-400 font-normal mt-1">${slot.time}</div>
                    </th>
                `;

                // Days Columns
                days.forEach(day => {
                    const cell = document.createElement('td');
                    cell.className = 'px-3 py-3 align-top border-r border-slate-100 min-w-[150px]';
                    
                    let cellContent = '';
                    const cellCourses = schedule[slot.id]?.[day] || [];

                    if (cellCourses.length > 0) {
                        cellCourses.forEach(course => {
                            const courseClass = getCourseClass(course);
                            
                            // 3-hour courses or custom segments show detailed slot details in brackets
                            let teacherDisplay = course.teacher;
                            if (course.slots.length >= 3) {
                                teacherDisplay = `${course.teacher} (${course.slots.join(', ')})`;
                            }

                            cellContent += `
                                <div class="course-card ${courseClass}" onclick="openModal(${JSON.stringify(course).replace(/"/g, '&quot;')})">
                                    <div class="name text-slate-800 font-bold">${course.name}</div>
                                    <div class="details mt-1.5 font-medium">
                                        <span class="text-slate-500">${course.grade} / ${course.type} / ${course.credits} / ${course.classroom || "教室未定"}</span>
                                        <div class="text-slate-600 font-semibold mt-1 flex justify-between items-center text-xs">
                                            <span>${teacherDisplay}</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    cell.innerHTML = cellContent;
                    row.appendChild(cell);
                });
                timetableBody.appendChild(row);
            });
        }

        // Filtering function
        function applyFilters() {
            const searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            const selectedGrade = document.getElementById('grade-filter').value;
            const selectedType = document.getElementById('type-filter').value;

            const fullDataset = getActiveDataset();

            const filtered = fullDataset.filter(course => {
                const matchesSearch = course.name.toLowerCase().includes(searchQuery) || 
                                      course.teacher.toLowerCase().includes(searchQuery) ||
                                      (course.classroom && course.classroom.toLowerCase().includes(searchQuery));
                
                const matchesGrade = selectedGrade === 'all' || course.grade === selectedGrade;
                const matchesType = selectedType === 'all' || course.type === selectedType;

                return matchesSearch && matchesGrade && matchesType;
            });

            renderTimetable(filtered);
        }

        // Modal Controls
        function openModal(course) {
            const modal = document.getElementById('course-modal');
            const container = document.getElementById('modal-container');
            
            document.getElementById('modal-title').innerText = course.name;
            document.getElementById('modal-grade').innerText = `大${course.grade} (或碩士班)`;
            document.getElementById('modal-type').innerText = course.type === '必' ? '必修課程' : '選修課程';
            document.getElementById('modal-credits').innerText = `${course.credits} 學分`;
            document.getElementById('modal-classroom').innerText = course.classroom || "教室未定";
            document.getElementById('modal-teacher').innerText = course.teacher;
            document.getElementById('modal-slots').innerText = `${course.day} ${course.slots.join(', ')}`;

            // Dynamically set header border color based on type
            const header = document.getElementById('modal-header');
            header.className = "p-6 border-b-4 " + 
                (course.grade === '碩' ? 'border-purple-500' : (course.type === '必' ? 'border-red-500' : 'border-blue-500'));

            modal.classList.remove('hidden');
            setTimeout(() => {
                container.classList.remove('scale-95');
                container.classList.add('scale-100');
            }, 50);
        }

        function closeModal() {
            const modal = document.getElementById('course-modal');
            const container = document.getElementById('modal-container');
            
            container.classList.remove('scale-100');
            container.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 150);
        }

        // Close modal on background click
        document.getElementById('course-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize view on load
        document.addEventListener('DOMContentLoaded', () => {
            renderTimetable(courseData1151);
        });
    </script>
